server:
  port: 8082

spring:
  application:
    name: billing
  datasource:
   # url: jdbc:postgresql://localhost:5432/billing_test
   # username: postgres
   # password: postgres
  hikari:
     minimum-idle: 1
     maximum-pool-size: 10
     connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate  # ou none, se você já tinha migrations rodando
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
   # user: postgres
    #password: postgres
    #url: jdbc:postgresql://localhost:5432/billing_test

logging:
  level:
    org.flywaydb.core: DEBUG
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.orm.jdbc.extract: trace

